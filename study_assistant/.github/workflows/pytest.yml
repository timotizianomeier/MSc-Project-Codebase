name: Pytest
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    env:
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "120"

    steps:
      # System deps (platform-specific)
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9  # v1.6.3
        with:
          packages: libcairo2-dev libgirepository1.0-dev gir1.2-gst-plugins-base-1.0
          version: 1.0

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo gobject-introspection

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          # gobject-introspection wheels on Windows bundle their own libs;
          # if your build needs the native libs, swap this for a vcpkg/msys2 step.
          echo "No extra system packages required (using wheel-bundled libs)"

      # Checkout & toolchain
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          # Fetch LFS content: the personality avatar SVGs (*.svg is LFS-tracked)
          # are read by tests/test_personality_avatars.py; without this the
          # checkout leaves LFS pointer files and the "<svg" assertions fail.
          lfs: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      # HF cache
      - name: Set HF_HOME
        shell: bash
        run: |
          echo "HF_HOME=${RUNNER_TEMP}/.hf" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/.hf"

      - name: Cache Hugging Face hub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ${{ runner.temp }}/.hf
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: hf-${{ runner.os }}-

      # Test .env
      - name: Create test .env
        shell: bash
        run: |
          printf "OPENAI_API_KEY=test-dummy\n" > .env

      # Install
      - name: Install (frozen)
        run: uv sync --frozen --group dev

      # Prefetch HF dataset
      - name: Prefetch HF dataset (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          .venv/bin/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      - name: Prefetch HF dataset (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv/Scripts/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      # Tests
      - name: Run tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: .venv/bin/pytest -q

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .venv/Scripts/pytest -q
