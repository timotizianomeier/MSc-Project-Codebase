<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Reachy Mini · Conversation</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script type="module" src="/static/js/main.js"></script>
  </head>
  <body>
    <header class="app-shell__header" role="banner">
      <div class="app-shell__lead">
        <button
          type="button"
          class="app-shell__icon-btn app-shell__back"
          data-action="go-back"
          aria-label="Back to home"
          title="Back"
          hidden
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <a href="#/" class="app-shell__brand" data-action="go-home" aria-label="Reachy Mini home">
          <span class="app-shell__brand-mark" aria-hidden="true">
            <img src="/static/avatars/default.svg" alt="" draggable="false" />
          </span>
          <span class="app-shell__brand-text">Reachy Mini</span>
        </a>
      </div>
      <button
        type="button"
        class="app-shell__icon-btn app-shell__gear"
        data-action="open-settings"
        aria-label="Open settings"
        title="Settings"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
    <div class="app-shell__personality-row" data-component="personality-row" hidden>
      <button
        type="button"
        class="app-shell__personality"
        data-component="personality-badge"
        data-action="open-personalities"
        aria-label="Change personality"
      >
        <span class="app-shell__personality-avatar" aria-hidden="true">
          <img src="/static/avatars/default.svg" alt="" draggable="false" />
        </span>
        <span class="app-shell__personality-text">
          <span class="app-shell__personality-label">Personality</span>
          <span class="app-shell__personality-name" aria-live="polite"></span>
        </span>
      </button>
      <button
        type="button"
        class="app-shell__default-personality"
        data-component="default-personality-action"
        hidden
      >
        Set as default
      </button>
    </div>
    <main id="view-outlet" class="app-shell__outlet" role="main"></main>
  </body>
</html>
